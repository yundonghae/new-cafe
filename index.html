<!DOCTYPE html>

<link rel="stylesheet" href="css/variables.css" />

<body>
  <header class="site-header glass">

        <a href="menus/list.html" class="btn btn--ghost btn--sm">전체보기 →</a>

  <script src="js/data.js"></script>
